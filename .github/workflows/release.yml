name: Build & Release

# Push a tag like `v0.1.0` to build the portable Windows .exe and attach it to a GitHub Release.
# Or run manually (workflow_dispatch) to just build it and grab it from the run's artifacts.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Let the run's GITHUB_TOKEN create a Release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build bundles
        run: npm run build

      # Package the portable .exe (electron-builder rebuilds better-sqlite3 for the Electron ABI).
      # On a v* tag, publish it to a GitHub Release; otherwise just build (artifact below).
      - name: Package portable exe
        run: npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable exe as a workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pink-lemonade-portable
          path: dist/*.exe
          if-no-files-found: error
