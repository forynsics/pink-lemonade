appId: com.pinklemonade.app
productName: pink-lemonade
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
# The app no longer spawns Claude Code itself — the analyst's OWN `claude` connects to the localhost MCP
# server (src/main/ai/mcp). So there's no Anthropic SDK/binary to bundle or exclude here.
# better-sqlite3 is a native .node binary and can't run from inside the asar archive, so it's unpacked.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
win:
  icon: build/icon.ico
  target:
    - portable
# Single double-click .exe — no install. Self-extracts the runtime to a temp dir and launches.
portable:
  artifactName: pink-lemonade-${version}-portable.${ext}
  requestExecutionLevel: user
# Where `electron-builder --publish always` (the release workflow, on a v* tag) uploads the .exe.
publish:
  provider: github
  owner: forynsics
  repo: pink-lemonade
