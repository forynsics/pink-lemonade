appId: com.pinklemonade.app
productName: pink-lemonade
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
# better-sqlite3 ships a native .node binary that can't be loaded from inside the asar,
# so it must be unpacked. (Windows-ABI rebuild on a Windows runner is still a later task.)
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
win:
  icon: build/icon.ico
  target:
    - portable
# Single double-click .exe — no install. Self-extracts the runtime to a temp dir and launches.
portable:
  artifactName: pink-lemonade-${version}-portable.${ext}
  requestExecutionLevel: user
